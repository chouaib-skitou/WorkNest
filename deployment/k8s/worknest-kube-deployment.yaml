apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: worknest/identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: BASE_URL
              value: "http://identity-service:5000"
            - name: DATABASE_URL
              value: "postgresql://root:root@postgres-db:5432/identity_service?schema=public"
            - name: SMTP_HOST
              value: "mailhog"
            - name: SMTP_PORT
              value: "1025"
            - name: EMAIL_FROM
              value: "no-reply@worknest.com"
            - name: JWT_EXPIRES_IN
              value: "1h"
            - name: JWT_REFRESH_EXPIRES_IN
              value: "7d"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-refresh-secret
                  key: JWT_REFRESH_SECRET
            - name: PROJECT_SERVICE_URL
              value: "http://project-service:5001"
            - name: FRONTEND_URL
              value: "http://frontend:80"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: worknest/project-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: "production"
            - name: BASE_URL
              value: "http://project-service:5001"
            - name: DATABASE_URL
              value: "postgresql://root:root@postgres-db:5432/project_service?schema=public"
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:5000"
            - name: FRONTEND_URL
              value: "http://frontend:80"
---
apiVersion: v1
kind: Service
metadata:
  name: project-service
spec:
  selector:
    app: project-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: worknest/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: BASE_URL
              value: "http://frontend:80"
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:5000"
            - name: PROJECT_SERVICE_URL
              value: "http://project-service:5001"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer